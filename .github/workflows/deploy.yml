name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate config
        run: |
          echo "const BOT_TOKEN = '${{ secrets.BOT_TOKEN }}';" > js/config.js
          echo "const CHAT_ID = '${{ secrets.CHAT_ID }}';" >> js/config.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
